{% extends "main/panel.html" %}
{% load static %}

  {% block title %}
  Your Candidate
  {% endblock %}


{% block content %}
    <div class="row">
     
      <div class="col-lg-8">
        <svg class="bd-placeholder-img rounded-circle" width="140" height="140" xmlns="{{ contestant.picture.url }}" preserveAspectRatio="xMidYMid slice" focusable="false" role="img" aria-label="Placeholder: 140x140"><title>Placeholder</title><rect width="100%" height="100%" fill="#777"/><text x="50%" y="50%" fill="#777" dy=".3em">140x140</text></svg>
        <h2>{{ contestant.name }}</h2>
        <p>{{ contestant.contestant_code }}</p>
        <p><a class="btn btn-secondary" href="{% url 'payment' %}" role="button">Vote &raquo;</a></p>
      </div><!-- /.col-lg-4 -->

    
    </div>
{% endblock %}
