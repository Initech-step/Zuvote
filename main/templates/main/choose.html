{% extends "main/base.html" %}
{% load static %}

{% block content%}

<main role="main" class="container">
  <div class="jumbotron">
    <h1>Choose Your Contestant</h1>
  </div>

   <div class="table-responsive">
        <table class="table table-striped table-sm">

          <thead>
            <tr>
              <th>Contestant Name</th>
              <th>Contestant Code</th>
              <th>Vote</th>
            </tr>
          </thead>

          <tbody>
          {% for package in packages %}
            <tr>
              <td>{{ package.name }}</td>
              <td>{{ package.contestant_code }}</td>

              <td class="text-primary"><a href="{% url 'choice' package.id %}">Vote</a></td>

            </tr>
          {% endfor %}
          </tbody>
        </table>
  </div>

</main>

{% endblock %}
