<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
    <meta name="description" content="">

    <title>Dashboard Template</title>
    {% load static %}
    
    <link href="{% static 'main/boot/bootstrap.min.css' %}" rel="stylesheet">
   <script src="{% static 'main/jquery.js' %}"></script>

    <style>
      .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }
    </style>
    <!-- Custom styles for this template -->
    <link href="dashboard.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
  <a class="navbar-brand col-md-3 col-lg-2 mr-0 px-3" href="#">ZuVote</a>
  <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-toggle="collapse" data-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <input class="form-control form-control-dark w-100" type="text" placeholder="Search" aria-label="Search">
  <ul class="navbar-nav px-3">
    <li class="nav-item text-nowrap">
      <a class="nav-link" href="#">Sign out</a>
    </li>
  </ul>
</nav>

<div class="container-fluid">
  <div class="row">
    <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
      <div class="sidebar-sticky pt-3">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'panel' %}">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'create' %}">
              Create Competition
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'addcontestant' %}">
              Register Contestants
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'updel' %}">
              Update Contestants Data
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'setall' %}">
              General Settings
            </a>
          </li>

        </ul>
      </div>
    </nav>

    <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">

        <div>
            <h2>
            {% block title %}
            {% endblock %}
            </h2>

            {% block content %}
            {% endblock %}
        </div>  
    </main>

  </div>
</div>
<script src="{% static 'main/js/bootstrap.min.js' %}"></script>
</body>
</html>
