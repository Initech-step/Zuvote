
{% extends "main/base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content%}

<main role="main" class="container">
  <div class="jumbotron">
    <h1>Sign Up Here!</h1>
  </div>


<form class="form-signin" method="post" action="">
   {% csrf_token %}
   {{ form|crispy }}

  <p class="mt-5 mb-3 text-muted">&copy; 2017-2020</p>
</form>

</main>

{% endblock %}
