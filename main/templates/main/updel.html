{% extends "main/panel.html" %}
{% load static %}

  {% block title %}
   Update Contestant Data
  {% endblock %}

{% block content%}

<main role="main" class="container">

 <div class="table-responsive">
        <table class="table table-striped table-sm">

          <thead>
            <tr>
              <th>Contestant Name</th>
              <th>Contestant Code</th>
              <th>Update</th>
            </tr>
          </thead>

          <tbody>
          {% for package in packages %}
            <tr>
              <td>{{ package.name }}</td>
              <td>{{ package.contestant_code }}</td>

              <td class="text-success"><a href="{% url 'update' package.id %}">UPDATE</a></td>

            </tr>
          {% endfor %}
          </tbody>
        </table>
  </div>

</main>

{% endblock %}
